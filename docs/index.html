<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Color Script Generator</title>
    <meta
      name="description"
      content="Client-side tool that samples video key frames and exports scene palettes as horizontal color-script strips."
    />
    <style>
      :root {
        color: #17201b;
        background: #f7f4ed;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100vw - 32px));
      }

      h1 {
        font-size: clamp(2rem, 5vw, 4.4rem);
        line-height: 0.96;
        margin: 0 0 20px;
        letter-spacing: 0;
      }

      p {
        color: #4d5b52;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        color: #0e5b4b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Film Color Script Generator</h1>
      <p>
        A browser-only color study tool for film stills, palettes, and horizontal color-script
        exports.
      </p>
      <nav aria-label="Project links">
        <a href="https://github.com/baditaflorin/film-color-script-generator">GitHub</a>
        <a href="https://www.paypal.com/paypalme/florinbadita">PayPal</a>
      </nav>
    </main>
  </body>
</html>
